<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - RandomChat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: rgb(10, 10, 20);
            --foreground: rgb(250, 250, 250);
            --card: rgb(15, 15, 30);
            --destructive: rgb(239, 68, 68);
            --white-30: rgba(255, 255, 255, 0.30);
            --white-50: rgba(255, 255, 255, 0.50);
            --white-70: rgba(255, 255, 255, 0.70);
            --font-sans: 'DM Sans', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a3e 0%, var(--background) 50%, #2a1a4e 100%);
            color: var(--foreground);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-family: var(--font-display);
        }

        .bg-gradient-1 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            filter: blur(120px);
            top: 0;
            left: 25%;
            pointer-events: none;
        }

        .bg-gradient-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 50%;
            filter: blur(150px);
            bottom: 0;
            right: 25%;
            pointer-events: none;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .error-icon {
            width: 64px;
            height: 64px;
            background: rgba(239, 68, 68, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .screen h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .screen p {
            color: var(--white-70);
            margin-bottom: 2rem;
            max-width: 400px;
        }

        .btn {
            padding: 0.75rem 2rem;
            background: white;
            color: black;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-sans);
            font-size: 1rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <!-- Main Content -->
    <div class="screen">
        <div class="error-icon">❌</div>
        <h2>Oops!</h2>
        <p id="errorMessage">Something went wrong. Please try again.</p>
        <button class="btn" onclick="goHome()">Go Home</button>
    </div>

    <script>
        function goHome() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Display error message if passed in URL
        const params = new URLSearchParams(window.location.search);
        const error = params.get('message');
        if (error) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(error);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Chat - RandomChat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: rgb(10, 10, 20);
            --foreground: rgb(250, 250, 250);
            --card: rgb(15, 15, 30);
            --primary: rgb(139, 92, 246);
            --destructive: rgb(239, 68, 68);
            --white-5: rgba(255, 255, 255, 0.05);
            --white-10: rgba(255, 255, 255, 0.10);
            --white-20: rgba(255, 255, 255, 0.20);
            --white-30: rgba(255, 255, 255, 0.30);
            --white-50: rgba(255, 255, 255, 0.50);
            --white-80: rgba(255, 255, 255, 0.80);
            --white-90: rgba(255, 255, 255, 0.90);
            --font-sans: 'DM Sans', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        body {
            background: var(--background);
            color: var(--foreground);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(15, 15, 30, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid var(--white-5);
            border-radius: 1.5rem;
            margin: 0.5rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .header-title {
            font-weight: bold;
            font-size: 1.125rem;
            display: none;
        }

        @media (min-width: 640px) {
            .header-title {
                display: block;
            }
        }

        .header-right {
            display: flex;
            gap: 0.75rem;
        }

        /* Main Container */
        .container {
            flex: 1;
            display: flex;
            gap: 1rem;
            padding: 1rem;
            overflow: hidden;
        }

        /* Video Section */
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
        }

        .video-main {
            flex: 1;
            position: relative;
            background: var(--card);
            border: 1px solid var(--white-10);
            border-radius: 1.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder {
            text-align: center;
            color: var(--white-50);
        }

        .video-label {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--white-10);
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--white-90);
        }

        .local-video {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            width: 120px;
            height: 160px;
            background: black;
            border: 2px solid var(--white-20);
            border-radius: 0.75rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        /* Chat Section */
        .chat-section {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            background: rgba(15, 15, 30, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid var(--white-5);
            border-radius: 1.5rem;
            overflow: hidden;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .chat-section {
                max-width: none;
                height: 300px;
            }
        }

        .chat-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--white-5);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .chat-header-sub {
            font-size: 0.75rem;
            color: var(--white-40);
            margin-top: 0.25rem;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
            animation: pulse-status 2s infinite;
        }

        @keyframes pulse-status {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.5rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.you {
            justify-content: flex-end;
        }

        .message-label {
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            padding: 0 0.25rem;
        }

        .message.you .message-label {
            color: rgba(139, 92, 246, 0.7);
            text-align: right;
        }

        .message.them .message-label {
            color: var(--white-40);
        }

        .message-bubble {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            line-height: 1.4;
        }

        .message.you .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.them .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-bottom-left-radius: 0.25rem;
            border: 1px solid var(--white-5);
        }

        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white-30);
            font-size: 0.875rem;
        }

        .chat-input-form {
            padding: 0.75rem;
            border-top: 1px solid var(--white-5);
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--white-10);
            border-radius: 0.75rem;
            color: var(--foreground);
            font-family: var(--font-sans);
            font-size: 0.875rem;
        }

        .chat-input::placeholder {
            color: var(--white-30);
        }

        .chat-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--white-20);
        }

        .chat-send {
            padding: 0.875rem 1rem;
            background: rgba(139, 92, 246, 0.2);
            color: var(--primary);
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-send:hover {
            background: var(--primary);
            color: white;
        }

        .chat-send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Buttons */
        .btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-sans);
            font-size: 0.875rem;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary), rgba(139, 92, 246, 0.8));
            color: white;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(to right, rgba(139, 92, 246, 0.9), var(--primary));
            box-shadow: 0 10px 25px -3px rgba(139, 92, 246, 0.4);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--destructive);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Header (tumhara same) -->
    <header>
        <div class="header-left">
            <div class="header-logo">🌐</div>
            <h1 class="header-title">RandomChat</h1>
        </div>
        <div class="header-right">
            <button onclick="skipPartner()" class="btn btn-primary">Skip</button>
            <button onclick="goHome()" class="btn btn-danger">Stop</button>
        </div>
    </header>

    <div class="container">
        <!-- Video Section -->
        <div class="video-section">
            <div class="video-main">
                <video id="remoteVideo" autoplay playsinline class="remote-video"></video>
                <div class="video-label" id="partnerLabel">Stranger</div>
                
                <!-- Local Video -->
                <div class="local-video">
                    <video id="localVideo" autoplay muted playsinline></video>
                </div>
            </div>
        </div>

        <!-- Chat Section (tumhara same) -->
        <div class="chat-section">
            <!-- tumhara chat header, messages, input same hai -->
            <div class="chat-header"> ... </div>
            <div class="chat-messages scrollbar-hide" id="chatMessages">
                <div class="chat-empty">👋 Say hi to break the ice!</div>
            </div>
            <form class="chat-input-form" onsubmit="return sendMessage(event)">
                <input type="text" class="chat-input" placeholder="Type a message..." id="messageInput">
                <button type="submit" class="chat-send">💬</button>
            </form>
        </div>
    </div>

    <script>
        // ====================== MAIN LOGIC ======================
        const socket = io();
        let localStream = null;
        let peerConnection = null;
        let currentRoom = null;
        let isInitiator = false;

        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Get user data
        const userName = localStorage.getItem('userName') || 'Guest';
        const userGender = localStorage.getItem('userGender') || 'male';

        // =============== SOCKET EVENTS ===============
        socket.on('connect', () => {
            console.log('Connected to server');
            socket.emit('join', { name: userName, gender: userGender });
        });

        socket.on('waiting', () => {
            console.log('Waiting for partner...');
            // Tum chaaho toh "finding" wala feel dikhane ke liye kuch UI change kar sakte ho
        });

        socket.on('matched', async (data) => {
            currentRoom = data.room;
            isInitiator = data.initiator;
            document.getElementById('partnerLabel').textContent = data.partner.name || 'Stranger';

            await startWebRTC(data.partner);
        });

        socket.on('offer', async (offer) => {
            if (!peerConnection) await createPeerConnection();
            await peerConnection.setRemoteDescription(offer);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', { room: currentRoom, answer });
        });

        socket.on('answer', async (answer) => {
            await peerConnection.setRemoteDescription(answer);
        });

        socket.on('ice-candidate', async (candidate) => {
            if (peerConnection) await peerConnection.addIceCandidate(candidate);
        });

        socket.on('chat-message', (data) => {
            addMessage(data.message, 'them');
        });

        socket.on('partner-left', () => {
            alert('Partner left the chat 💔\nFinding new stranger...');
            resetChat();
            socket.emit('join', { name: userName, gender: userGender });
        });

        // =============== WEBRTC FUNCTIONS ===============
        async function startWebRTC(partnerData) {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;

            await createPeerConnection();

            if (isInitiator) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('offer', { room: currentRoom, offer });
            }
        }

        async function createPeerConnection() {
            peerConnection = new RTCPeerConnection(config);

            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { room: currentRoom, candidate: event.candidate });
                }
            };
        }

        // =============== CHAT ===============
        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();

            if (msg && currentRoom) {
                const messagesDiv = document.getElementById('chatMessages');
                if (messagesDiv.querySelector('.chat-empty')) messagesDiv.innerHTML = '';

                addMessage(msg, 'you');

                socket.emit('chat-message', {
                    room: currentRoom,
                    message: msg
                });

                input.value = '';
            }
            return false;
        }

        function addMessage(text, type) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `
                <div>
                    <div class="message-label">${type === 'you' ? 'You' : 'Stranger'}</div>
                    <div class="message-bubble">${text}</div>
                </div>
            `;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // =============== SKIP / DISCONNECT ===============
        function skipPartner() {
            if (confirm('Skip this stranger?')) {
                socket.emit('skip');
                resetChat();
                socket.emit('join', { name: userName, gender: userGender });
            }
        }

        function resetChat() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('chatMessages').innerHTML = '<div class="chat-empty">👋 Say hi to break the ice!</div>';
            currentRoom = null;
        }

        function goHome() {
            resetChat();
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // =============== CLEANUP ===============
        window.addEventListener('beforeunload', () => {
            socket.emit('skip');
            resetChat();
        });
    </script>
</body>
</html>

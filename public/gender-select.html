<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Gender - RandomChat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: rgb(10, 10, 20);
            --foreground: rgb(250, 250, 250);
            --card: rgb(15, 15, 30);
            --primary: rgb(139, 92, 246);
            --white-5: rgba(255, 255, 255, 0.05);
            --white-10: rgba(255, 255, 255, 0.10);
            --white-30: rgba(255, 255, 255, 0.30);
            --white-50: rgba(255, 255, 255, 0.50);
            --white-80: rgba(255, 255, 255, 0.80);
            --white-90: rgba(255, 255, 255, 0.90);
            --font-sans: 'DM Sans', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a3e 0%, var(--background) 50%, #2a1a4e 100%);
            color: var(--foreground);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: bold;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .bg-gradient-1 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            filter: blur(120px);
            top: 0;
            left: 25%;
            pointer-events: none;
        }

        .bg-gradient-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 50%;
            filter: blur(150px);
            bottom: 0;
            right: 25%;
            pointer-events: none;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            margin-bottom: 3rem;
            position: relative;
        }

        .icon-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 50%;
            filter: blur(30px);
            z-index: 0;
        }

        .icon-box {
            position: relative;
            z-index: 1;
            width: 96px;
            height: 96px;
            background: var(--card);
            border: 2px solid var(--white-10);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            transform: rotate(-6deg);
            transition: transform 0.3s;
        }

        .icon-box:hover {
            transform: rotate(0);
        }

        .icon-box svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
        }

        .content-text {
            text-align: center;
            margin-bottom: 2.5rem;
            max-width: 500px;
        }

        .content-text h1 {
            font-size: 2.25rem;
            font-weight: bold;
            background: linear-gradient(to bottom right, white, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        @media (min-width: 768px) {
            .content-text h1 {
                font-size: 2.75rem;
            }
        }

        .content-text p {
            font-size: 1.125rem;
            color: var(--white-50);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .content-text .subtext {
            font-size: 0.875rem;
            color: rgba(139, 92, 246, 0.8);
            font-weight: 500;
        }

        .glass-panel {
            background: rgba(15, 15, 30, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid var(--white-5);
            border-radius: 1.5rem;
            padding: 0.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        @media (min-width: 640px) {
            .glass-panel {
                flex-direction: row;
            }
        }

        .btn-gender {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.05);
            color: var(--white-90);
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-sans);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 1rem;
        }

        .btn-gender:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--white-10);
        }

        .btn-gender svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s;
        }

        .btn-gender:hover svg {
            transform: scale(1.1);
        }

        .gender-male svg {
            color: #60a5fa;
        }

        .gender-female svg {
            color: #ec4899;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <!-- Main Content -->
    <main>
        <div class="screen">
            <!-- Icon -->
            <div class="icon-wrapper">
                <div class="icon-glow"></div>
                <div class="icon-box">
                    🌐
                </div>
            </div>

            <!-- Content -->
            <div class="content-text">
                <h1>Talk to Strangers</h1>
                <p>Meet new people instantly. Select your gender to start a secure, peer-to-peer video chat.</p>
                <p class="subtext">Chatting as: <span style="font-weight: bold; color: var(--foreground);" id="displayName">Guest</span></p>
            </div>

            <!-- Buttons -->
            <div class="glass-panel">
                <button class="btn-gender gender-male" onclick="startChat('male')">
                    👤 I am Male
                </button>
                <button class="btn-gender gender-female" onclick="startChat('female')">
                    👤 I am Female
                </button>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => {
            const name = localStorage.getItem('userName') || 'Guest';
            document.getElementById('displayName').textContent = name;
        });

        function startChat(gender) {
            localStorage.setItem('userGender', gender);
            window.location.href = 'permissions.html';
        }
    </script>
</body>
</html>

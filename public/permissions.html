<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allow Permissions - RandomChat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: rgb(10, 10, 20);
            --foreground: rgb(250, 250, 250);
            --card: rgb(15, 15, 30);
            --primary: rgb(139, 92, 246);
            --white-5: rgba(255, 255, 255, 0.05);
            --white-10: rgba(255, 255, 255, 0.10);
            --white-50: rgba(255, 255, 255, 0.50);
            --font-sans: 'DM Sans', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a3e 0%, var(--background) 50%, #2a1a4e 100%);
            color: var(--foreground);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1, h2 {
            font-family: var(--font-display);
            font-weight: bold;
        }

        .bg-gradient-1 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            filter: blur(120px);
            top: 0;
            left: 25%;
            pointer-events: none;
        }

        .bg-gradient-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 50%;
            filter: blur(150px);
            bottom: 0;
            right: 25%;
            pointer-events: none;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }

        .icon-circle svg {
            width: 32px;
            height: 32px;
            color: var(--primary);
        }

        .screen h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .screen p {
            color: var(--white-50);
            margin-bottom: 2rem;
            max-width: 400px;
        }

        .icon-row {
            display: flex;
            gap: 1rem;
            opacity: 0.5;
        }

        .icon-row svg {
            width: 24px;
            height: 24px;
            color: var(--foreground);
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <!-- Main Content -->
    <div class="screen">
        <div class="icon-circle">
            📷
        </div>
        <h2>Allow Camera & Mic</h2>
        <p>We need access to your media devices to connect you with strangers.</p>
        <div class="icon-row">
            <span>🎤</span>
            <span>📷</span>
        </div>
    </div>

    <script>
        // Auto-request permissions
        setTimeout(() => {
            navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: true 
            }).then(() => {
                window.location.href = 'chat.html';
            }).catch(err => {
                console.error('Permission denied:', err);
                alert('Camera and microphone access is required to use this app.');
            });
        }, 1500);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomChat - Talk to Strangers</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: rgb(10, 10, 20);
            --foreground: rgb(250, 250, 250);
            --card: rgb(15, 15, 30);
            --card-foreground: rgb(250, 250, 250);
            --primary: rgb(139, 92, 246);
            --primary-foreground: rgb(255, 255, 255);
            --destructive: rgb(239, 68, 68);
            --white-5: rgba(255, 255, 255, 0.05);
            --white-10: rgba(255, 255, 255, 0.10);
            --white-20: rgba(255, 255, 255, 0.20);
            --white-30: rgba(255, 255, 255, 0.30);
            --white-40: rgba(255, 255, 255, 0.40);
            --white-50: rgba(255, 255, 255, 0.50);
            --white-60: rgba(255, 255, 255, 0.60);
            --white-70: rgba(255, 255, 255, 0.70);
            --white-80: rgba(255, 255, 255, 0.80);
            --white-90: rgba(255, 255, 255, 0.90);
            --font-sans: 'DM Sans', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a3e 0%, var(--background) 50%, #2a1a4e 100%);
            color: var(--foreground);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-display);
            font-weight: bold;
        }

        /* Header */
        header {
            border-bottom: 1px solid var(--white-5);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            padding: 1rem;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
            font-weight: bold;
            color: white;
            font-size: 0.8rem;
        }

        .header-title {
            font-size: 1.125rem;
            font-weight: bold;
            display: none;
        }

        @media (min-width: 640px) {
            .header-title {
                display: block;
            }
        }

        nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        nav a {
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            background: var(--white-5);
            color: var(--white-80);
            text-decoration: none;
            font-size: 0.75rem;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        @media (min-width: 768px) {
            nav a {
                padding: 0.5rem 0.75rem;
                font-size: 0.875rem;
            }
        }

        nav a:hover {
            background: var(--white-10);
            color: var(--foreground);
        }

        .nav-developer {
            background: rgba(139, 92, 246, 0.2);
            color: var(--primary);
        }

        .nav-developer:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Background Elements */
        .bg-gradient-1 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            filter: blur(120px);
            top: 0;
            left: 25%;
            pointer-events: none;
        }

        .bg-gradient-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 50%;
            filter: blur(150px);
            bottom: 0;
            right: 25%;
            pointer-events: none;
        }

        /* Name Input Screen */
        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .icon-wrapper {
            margin-bottom: 2rem;
            position: relative;
        }

        .icon-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 50%;
            filter: blur(30px);
            z-index: 0;
        }

        .icon-box {
            position: relative;
            z-index: 1;
            width: 96px;
            height: 96px;
            background: var(--card);
            border: 2px solid var(--white-10);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            transform: rotate(-6deg);
            transition: transform 0.3s;
        }

        .icon-box:hover {
            transform: rotate(0);
        }

        .icon-box svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
        }

        .content-text {
            text-align: center;
            margin-bottom: 2rem;
            max-width: 500px;
        }

        .content-text h1 {
            font-size: 2.25rem;
            font-weight: bold;
            background: linear-gradient(to bottom right, white, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        @media (min-width: 768px) {
            .content-text h1 {
                font-size: 3rem;
            }
        }

        .content-text p {
            font-size: 1.125rem;
            color: var(--white-50);
            line-height: 1.6;
        }

        .content-text .subtext {
            font-size: 0.875rem;
            color: rgba(139, 92, 246, 0.8);
            font-weight: 500;
            margin-top: 1rem;
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(15, 15, 30, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid var(--white-5);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 1.5rem;
            width: 100%;
        }

        /* Form Elements */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--white-5);
            border: 1px solid var(--white-10);
            border-radius: 0.75rem;
            color: var(--foreground);
            font-size: 1rem;
            font-family: var(--font-sans);
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            ring: 2px;
            ring-color: rgba(139, 92, 246, 0.5);
            background: rgba(255, 255, 255, 0.1);
            border-color: transparent;
        }

        .form-input::placeholder {
            color: var(--white-30);
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-sans);
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary), rgba(139, 92, 246, 0.8));
            color: white;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
            width: 100%;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, rgba(139, 92, 246, 0.9), var(--primary));
            box-shadow: 0 10px 25px -3px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white-90);
            border: 1px solid transparent;
            flex: 1;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--white-10);
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            flex-direction: column;
        }

        @media (min-width: 640px) {
            .button-group {
                flex-direction: row;
            }
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--white-5);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            text-align: center;
        }

        footer p {
            font-size: 0.875rem;
            color: var(--white-60);
            font-family: var(--font-display);
        }

        footer .developer-name {
            font-weight: bold;
            color: var(--foreground);
        }

        /* Loading State */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--white-20);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Icon Styles */
        .icon {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: -0.125em;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="header-left">
                <div class="header-logo">🌐</div>
                <h2 class="header-title">RandomChat</h2>
            </div>
            <nav>
                <a href="https://t.me/sayan_xbot" target="_blank">Telegram Group</a>
                <a href="https://t.me/+EGhGn3zhKRowYmZl" target="_blank">Channel</a>
                <a href="https://t.me/Zoroxbug" target="_blank">Support</a>
                <a href="https://t.me/Zoroxbug" target="_blank" class="nav-developer">Developer</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="screen">
            <!-- Icon -->
            <div class="icon-wrapper">
                <div class="icon-glow"></div>
                <div class="icon-box">
                    👤
                </div>
            </div>

            <!-- Content -->
            <div class="content-text">
                <h1>What's your name?</h1>
                <p>Tell us your name so strangers know who they're talking to.</p>
            </div>

            <!-- Form -->
            <div class="glass-panel">
                <form class="form-group" onsubmit="return handleNameSubmit(event)">
                    <input 
                        type="text" 
                        id="nameInput" 
                        class="form-input" 
                        placeholder="Enter your name"
                        required
                        autofocus
                    >
                    <button type="submit" class="btn btn-primary">Continue</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>Built by <span class="developer-name">𝐃 𝐇 — ا 𝐘</span></p>
    </footer>

    <script>
        function handleNameSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('nameInput').value.trim();
            if (name) {
                localStorage.setItem('userName', name);
                window.location.href = 'gender-select.html';
            }
            return false;
        }
    </script>
</body>
</html>
